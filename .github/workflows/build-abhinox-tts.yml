name: Build Abhinox TTS APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Pre-built C++ Libraries
        run: |
          mkdir temp_jni && cd temp_jni
          wget https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.4/sherpa-onnx-v1.13.4-android.tar.bz2
          tar -xjf sherpa-onnx-v1.13.4-android.tar.bz2
          JNI_SRC=$(find . -type d -name "jniLibs")
          cp -r $JNI_SRC ../android/SherpaOnnxTtsEngine/app/src/main/
          cd ..

      - name: Download Model and Espeak Data
        run: |
          ASSETS_DIR="android/SherpaOnnxTtsEngine/app/src/main/assets/abhinox-voice"
          mkdir -p $ASSETS_DIR
          cd $ASSETS_DIR
          
          wget https://huggingface.co/4bhinox/abhinox-voice/resolve/main/abhinox_v2_final.onnx
          wget https://huggingface.co/4bhinox/abhinox-voice/resolve/main/abhinox_v2_final.onnx.json
          wget https://huggingface.co/4bhinox/abhinox-voice/resolve/main/tokens.txt
          
          wget https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
          tar -xjf espeak-ng-data.tar.bz2
          rm espeak-ng-data.tar.bz2

      - name: Build APK
        working-directory: android/SherpaOnnxTtsEngine
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: abhinox-tts-apk
          path: android/SherpaOnnxTtsEngine/app/build/outputs/apk/debug/*.apk
